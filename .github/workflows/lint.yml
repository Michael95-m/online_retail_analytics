name: lint

on:                      # when to run
  push:
    branches: [main]
  pull_request:          # every PR

jobs:
  lint:
    runs-on: ubuntu-latest        # a fresh Linux VM GitHub gives you
    env:                          # dummy values — lint doesn't connect to a DB
      DBT_PROFILES_DIR: ${{ github.workspace }}/online_retail_analytics/profiles
      CLICKHOUSE_HOST: localhost
      CLICKHOUSE_PORT: "8123"
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_SCHEMA: retail
    steps:
      - uses: actions/checkout@v4          # clone your repo

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync                        # installs everything from uv.lock

      - name: pre-commit (whitespace, yaml, ruff, format)
        run: uv run pre-commit run --all-files

      - name: dbt deps + parse
        working-directory: online_retail_analytics
        run: |
          uv run dbt deps
          uv run dbt parse                  # validates the project compiles
