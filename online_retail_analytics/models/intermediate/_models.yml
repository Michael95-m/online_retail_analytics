version: 2

models:
  - name: int_products
    description: "One row per stock code with the description of the product and the first and the last invoice timestamp."

    columns:
      - name: stock_code
        description: "Product (item) code. Nominal, uniquely assigned to each distinct product."
        data_tests:
          - not_null
          - unique
      - name: description
        description: "Product (item) name. Nominal."
      - name: first_invoice_ts
        description: "The timestamp of the first invoice for this product."
        data_tests:
          - not_null
      - name: final_invoice_ts
        description: "The timestamp of the last invoice for this product."
        data_tests:
          - not_null

  - name: int_customers
    description: "One row per customer with the country and the gross revenue and cancelled revenue."

    columns:
      - name: customer_id
        description: "Customer id"
        data_tests:
          - not_null
          - unique
      - name: country
        description: "Country name. Nominal, the name of the country where each customer resides."
        data_tests:
          - not_null
      - name: first_invoice_ts
        description: "The timestamp of the first invoice for this customer."
        data_tests:
          - not_null
      - name: last_invoice_ts
        description: "The timestamp of the last invoice for this customer."
        data_tests:
          - not_null
      - name: total_invoice_count
        description: "The total number of invoices for this customer."
        data_tests:
          - not_null
      - name: cancelled_invoice_count
        description: "The total number of cancelled invoices for this customer."
        data_tests:
          - not_null
      - name: gross_revenue
        description: "The total revenue generated by this customer."
        data_tests:
          - not_null
      - name: cancelled_revenue
        description: "The total revenue lost due to cancelled orders for this customer."
        data_tests:
          - not_null

  - name: int_invoices
    description: "One row per invoice with the customer id, country, and associated metrics."

    columns:
      - name: invoice_id
        description: "Invoice id"
        data_tests:
          - not_null
          - unique
      - name: customer_id
        description: "Customer id"
      - name: country
        description: "Country name. Nominal, the name of the country where each customer resides."
        data_tests:
          - not_null
      - name: invoice_create_ts
        description: "The timestamp when this invoice was created. min(invoice_ts)"
        data_tests:
          - not_null
      - name: is_cancelled
        description: "Indicates whether the invoice is cancelled."
      - name: distinct_product_count
        description: "The number of distinct products in this invoice."
      - name: total_quantity
        description: "The total quantity of products in this invoice."
      - name: adjustment_quantity
        description: "The total quantity of products in this invoice that are zero-priced."
      - name: merchandise_revenue
        description: "The total revenue generated by merchandise products in this invoice."
      - name: non_merchandise_revenue
        description: "The total revenue generated by non-merchandise products like 'BANK CHARGES', 'AMAZONFEE' in this invoice."
      - name: total_revenue
        description: "The total revenue generated by this invoice."

  - name: int_invoice_items
    description: "One row per invoice id and stock code (line-item grain), with customer id, country, and associated metrics."

    columns:
      - name: invoice_id
        description: "Invoice id"
        data_tests:
          - not_null
      - name: stock_code
        description: "Product (item) code. Nominal, uniquely assigned to each distinct product."
        data_tests:
          - not_null
      - name: customer_id
        description: "Customer id"
      - name: country
        description: "Country name. Nominal, the name of the country where each customer resides"
      - name: is_cancelled
        description: "Indicates whether the invoice is cancelled."
      - name: is_merchandise
        description: "Indicates whether the stock code is merchandise or not."
      - name: invoice_create_ts
        description: "The timestamp when this invoice was created. min(invoice_ts)"
        data_tests:
          - not_null
      - name: total_quantity
        description: "The total quantity of this product with price more than zero in this invoice."
      - name: adjustment_quantity
        description: "The total quantity of this product with price equal to zero in this invoice."
      - name: line_revenue
        description: "The total revenue generated by this product in this invoice."
